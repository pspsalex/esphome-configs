    vars:
      name: dg_bad
      thermostat: dg_bad_th_dg_bad_th
      humidity: dg_bad_th_sensor_humidity

script:
  # Checks all climate zones and shows/hides the global main-screen pill warning.
  - id: check_global_heating_warning
    then:
      - lambda: |-
          bool any =
            (id(climate_eg_kitchen_action).state == "heating" && (id(climate_eg_kitchen_win_lower).state || id(climate_eg_kitchen_win_upper).state)) ||
            (id(climate_eg_living_action).state  == "heating" && (id(climate_eg_living_win_lower).state  || id(climate_eg_living_win_upper).state))  ||
            (id(climate_og_dani_action).state    == "heating" && (id(climate_og_dani_win_lower).state    || id(climate_og_dani_win_upper).state))    ||
            (id(climate_og_oli_action).state     == "heating" && (id(climate_og_oli_win_lower).state     || id(climate_og_oli_win_upper).state))     ||
            (id(climate_og_eltern_action).state  == "heating" && (id(climate_og_eltern_win_lower).state  || id(climate_og_eltern_win_upper).state))  ||
            (id(climate_og_bad_action).state     == "heating" && (id(climate_og_bad_win_lower).state     || id(climate_og_bad_win_upper).state))     ||
            (id(climate_dg_studio_action).state  == "heating" && (id(climate_dg_studio_win_lower).state  || id(climate_dg_studio_win_upper).state))  ||
            (id(climate_dg_bad_action).state     == "heating" && (id(climate_dg_bad_win_lower).state     || id(climate_dg_bad_win_upper).state));
          if (any) {
              lv_obj_clear_flag(id(main_heating_window_warning), LV_OBJ_FLAG_HIDDEN);
          } else {
              lv_obj_add_flag(id(main_heating_window_warning), LV_OBJ_FLAG_HIDDEN);
          }

lvgl:
  pages:
    - id: climate_page
      styles:
        - page

      widgets:
        - obj:
            width: ${(760 * ui_scale) | round | int}
            height: ${(440 * ui_scale) | round | int}
            x: ${(20 * ui_scale) | round | int}
            y: ${(20 * ui_scale) | round | int}
            pad_all: ${(20 * ui_scale) | round | int}

            styles:
              - clean_obj
              - main_container_style

            layout:
              type: FLEX
              flex_flow: COLUMN
              flex_align_main: START
              flex_align_cross: START

            widgets:
              - label:
                  # Climate Control
                  text: "CLIMATE CONTROL"
                  text_font: font_l_bold
                  text_color: 0xffffff
                  pad_bottom: 15

              - obj:
                  # Climate Controls
                  width: 100%
                  height: SIZE_CONTENT
                  styles:
                    - clean_obj
                  layout:
                    type: FLEX
                    flex_flow: ROW_WRAP
                    flex_align_main: START
                    flex_align_cross: START
                    pad_column: ${(20 * ui_scale) | round | int}
                    pad_row: ${(20 * ui_scale) | round | int}

                  widgets:
                    - obj: !include
                        file: "snippets/more-climate.yaml"
                        vars:
                          name: "eg_kitchen"
                          label: "KITCHEN"
                          ha_entity: "eg_kitchen_th_eg_kitchen_th"

                    - obj: !include
                        file: "snippets/more-climate.yaml"
                        vars:
                          name: "eg_living"
                          label: "LIVING"
                          ha_entity: "eg_living_th"

                    - obj: !include
                        file: "snippets/more-climate.yaml"
                        vars:
                          name: "og_dani"
                          label: "DANI"
                          ha_entity: "og_dani_th"

                    - obj: !include
                        file: "snippets/more-climate.yaml"
                        vars:
                          name: "og_oli"
                          label: "OLI"
                          ha_entity: "og_oli_th"

                    - obj: !include
                        file: "snippets/more-climate.yaml"
                        vars:
                          name: "og_eltern"
                          label: "ELTERN"
                          ha_entity: "og_eltern_th"

                    - obj: !include
                        file: "snippets/more-climate.yaml"
                        vars:
                          name: "og_bad"
                          label: "OG BATH"
                          ha_entity: "og_bad_th"

                    - obj: !include
                        file: "snippets/more-climate.yaml"
                        vars:
                          name: "dg_studio"
                          label: "STUDIO"
                          ha_entity: "dg_studio_th"

                    - obj: !include
                        file: "snippets/more-climate.yaml"
                        vars:
                          name: "dg_bad"
                          label: "STUDIO BATH"
                          ha_entity: "dg_bad_th_dg_bad_th"
