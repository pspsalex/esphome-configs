# Font sizes and UI layout defaults for CPA (1024x600), scaled ~1.265x vs medium.

packages:
  base: !include fonts-base.yaml

substitutions:
  boot_clock_align: TOP_LEFT
  boot_clock_x: "15"
  boot_clock_y: "15"

  boot_logo_align: CENTER
  boot_logo_x: "0"
  boot_logo_y: "-40"

  boot_spinner_align: CENTER
  boot_spinner_x: "0"
  boot_spinner_y: "95"
  boot_spinner_w: "50"
  boot_spinner_h: "50"

  boot_ip_x: "15"
  boot_ip_y: "-15"
  boot_ip_align: BOTTOM_LEFT
  boot_ip_font: "${default_font}"

  font_size_xs: "15"
  font_size_s: "18"
  font_size_m: "20"
  font_size_l: "23"
  font_size_xl: "30"
  font_size_2xl: "40"
  font_size_num_l: "61"
  font_size_num_xl: "81"
  font_size_clock: "101"
  font_size_num_2xl: "121"
  font_size_icon: "40"
