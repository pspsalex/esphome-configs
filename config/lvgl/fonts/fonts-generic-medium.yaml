# Font sizes and UI layout defaults for CYD and M5Paper (800x480 / 960x540).

packages:
  base: !include fonts-base.yaml

substitutions:
  boot_clock_align: TOP_LEFT
  boot_clock_x: "15"
  boot_clock_y: "15"

  boot_logo_align: CENTER
  boot_logo_x: "0"
  boot_logo_y: "-40"

  boot_spinner_align: CENTER
  boot_spinner_x: "0"
  boot_spinner_y: "95"
  boot_spinner_w: "50"
  boot_spinner_h: "50"

  boot_ip_x: "15"
  boot_ip_y: "-15"
  boot_ip_align: BOTTOM_LEFT
  boot_ip_font: "${default_font}"

  font_size_xs: "12"
  font_size_s: "14"
  font_size_m: "16"
  font_size_l: "18"
  font_size_xl: "24"
  font_size_2xl: "32"
  font_size_num_l: "48"
  font_size_num_xl: "64"
  font_size_clock: "80"
  font_size_num_2xl: "96"
  font_size_icon: "32"
