  climate_heating_off_small: image_fire_off_small
  climate_plus_small: image_plus_thick_small
  climate_minus_small: image_minus_thick_small
  climate_heating_auto_small: image_refresh_auto_small
  climate_heating_unknown_small: image_weather_unknown_xsmall

