substitutions:
  shadow_active: "0"
  theme_rollers_as_image: "false"

packages:
  colors: !include colors.yaml
  base: !include ../_base.yaml

lvgl:
  style_definitions:
    - id: !extend main_controls_button_pressed
      radius: 0
      bg_color: ${lvgl_color_bg}
      bg_opa: COVER
      color_filter_opa: TRANSP
    - id: !extend main_controls_button_focused
      bg_color: ${lvgl_color_bg}
      bg_opa: COVER
      radius: 0
    - id: !extend main_controls
      border_width: 2
      border_opa: COVER
      border_color: 0xcccccc
      radius: 5
      pad_all: 5
    - id: !extend main_controls_label
      border_width: 4
      border_color: 0xcccccc
      border_opa: COVER
      border_side: TOP
      text_font: "${lvgl_font_controls_label}"
      text_align: center
