  theme_status_battery_5_bar: image_battery_5_bar_small
  theme_status_battery_4_bar: image_battery_4_bar_small
  theme_status_battery_3_bar: image_battery_3_bar_small
  theme_status_battery_2_bar: image_battery_2_bar_small
  theme_status_battery_1_bar: image_battery_1_bar_small
  theme_status_battery_0_bar: image_battery_0_bar_small
  theme_status_battery_unknown: image_battery_unknown_small

  ### Weather forecast strip icons (small size).
  theme_icon_forecast_night: image_weather_night_small
  theme_icon_forecast_cloudy: image_weather_cloudy_small
