  theme_icon_forecast_snowy: image_weather_snowy_small
  theme_icon_forecast_snowy_rainy: image_weather_snowy_rainy_small
  theme_icon_forecast_sunny: image_weather_sunny_small
  theme_icon_forecast_windy: image_weather_windy_small
  theme_icon_forecast_windy_variant: image_weather_windy_variant_small
