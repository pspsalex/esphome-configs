  theme_icon_weather_windy: image_weather_windy_large
  theme_icon_weather_windy_variant: image_weather_windy_variant_large
  theme_icon_weather_exceptional: image_weather_exceptional_large
  theme_icon_weather_unknown: image_weather_unknown_large

  ### WiFi signal strength icons.
  theme_status_wifi_0: image_wifi_0_small
  theme_status_wifi_1: image_wifi_1_small
